<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกค่าไฟฟ้า</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        .card {
            border: none;
            border-radius: 16px;
        }
        .card-header {
            border-radius: 16px 16px 0 0 !important;
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
        }
        label {
            font-weight: 500;
            margin-bottom: 5px;
            color: #555;
        }
        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <div class="card shadow-lg max-w-md mx-auto" style="max-width: 500px;">
        <div class="card-header text-white text-center py-4">
            <h4 class="mb-0 fw-semibold">⚡ บันทึกข้อมูลค่าไฟฟ้า</h4>
        </div>
        <div class="card-body p-4">
            <form id="elecForm">
                
                <div class="mb-3">
                    <label>📍 สถานที่</label>
                    <select class="form-select" id="location" required>
                        <option value="" selected disabled>-- เลือกสถานที่ --</option>
                        <option value="อาคารบรัดเลย์+Welles">อาคารบรัดเลย์+Welles</option>
                        <option value="หอพัก 9 ชั้น">หอพัก 9 ชั้น</option>
                        <option value="อาคาร CCT">อาคาร CCT</option>
                        <option value="บ้านทุ่ง 24/1">บ้านทุ่ง 24/1</option>
                        <option value="บ้านทุ่ง 24/2">บ้านทุ่ง 24/2</option>
                        <option value="2/1 ซอยสว่าง 2">2/1 ซอยสว่าง 2</option>
                        <option value="2 ซอยสว่าง 2">2 ซอยสว่าง 2</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label>📅 เดือน</label>
                        <select class="form-select" id="month" required>
                            <option value="1">มกราคม</option>
                            <option value="2">กุมภาพันธ์</option>
                            <option value="3">มีนาคม</option>
                            <option value="4">เมษายน</option>
                            <option value="5" selected>พฤษภาคม</option>
                            <option value="6">มิถุนายน</option>
                            <option value="7">กรกฎาคม</option>
                            <option value="8">สิงหาคม</option>
                            <option value="9">กันยายน</option>
                            <option value="10">ตุลาคม</option>
                            <option value="11">พฤศจิกายน</option>
                            <option value="12">ธันวาคม</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3">
                        <label>🗓️ ปี (ค.ศ.)</label>
                        <input type="number" class="form-control" id="year" required value="2026">
                    </div>
                </div>

                <div class="row">
                    <div class="col-6 mb-4">
                        <label>📈 หน่วยที่ใช้ (kWh)</label>
                        <input type="number" step="0.01" class="form-control" id="units" placeholder="0.00" required>
                    </div>
                    <div class="col-6 mb-4">
                        <label>💰 จำนวนเงิน (บาท)</label>
                        <input type="number" step="0.01" class="form-control" id="amount" placeholder="0.00" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-sm">บันทึกข้อมูล</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="dashboard.html" class="text-decoration-none fw-medium text-secondary">
                    📊 ไปที่หน้า Dashboard สถิติ
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // URL Web App ของคุณ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqWI4F3NnGC2Bwg2tQ1SB-KDrpIMIg45jiQb2E64zDqQEHQqr4LXaQA6gymNF4ZEhw/exec';

    document.getElementById('elecForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. เรียก SweetAlert แสดงสถานะกำลังโหลด
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            html: 'โปรดรอสักครู่ ระบบกำลังส่งข้อมูลไปยัง Google Sheets',
            allowOutsideClick: false,
            allowEscapeKey: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        const data = {
            location: document.getElementById('location').value,
            month: parseInt(document.getElementById('month').value),
            year: parseInt(document.getElementById('year').value),
            units: parseFloat(document.getElementById('units').value),
            amount: parseFloat(document.getElementById('amount').value)
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                // 2. บันทึกสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    html: `บันทึกข้อมูลเรียบร้อยแล้ว<br><br><b>ค่าไฟฟ้าเฉลี่ย:</b> <span class="text-primary fs-5">${result.costPerUnit}</span> บาท/หน่วย`,
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#0d6efd',
                    customClass: {
                        popup: 'rounded-4'
                    }
                }).then(() => {
                    // ล้างค่าเฉพาะช่องกรอกหน่วยและจำนวนเงิน (ให้คงที่สถานที่และเดือนไว้ เผื่อบันทึกต่อ)
                    document.getElementById('units').value = '';
                    document.getElementById('amount').value = '';
                    // หรือถ้าอยากล้างฟอร์มทั้งหมดให้ใช้: document.getElementById('elecForm').reset();
                });
            } else {
                throw new Error('เกิดข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์');
            }
        } catch (error) {
            console.error(error);
            // 3. เกิดข้อผิดพลาด
            Swal.fire({
                icon: 'error',
                title: 'บันทึกไม่สำเร็จ',
                text: 'ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้ โปรดตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง',
                confirmButtonText: 'ลองใหม่',
                confirmButtonColor: '#dc3545',
                customClass: {
                    popup: 'rounded-4'
                }
            });
        }
    });
</script>
</body>
</html>
