<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกค่าไฟฟ้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm max-w-md mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">บันทึกข้อมูลค่าไฟฟ้า</h4>
        </div>
        <div class="card-body">
            <form id="elecForm">
                <div class="mb-3">
                    <label>สถานที่</label>
                    <select class="form-select" id="location" required>
                        <option value="">-- เลือกสถานที่ --</option>
                        <option value="อาคารบรัดเลย์+Welles">อาคารบรัดเลย์+Welles</option>
                        <option value="หอพัก 9 ชั้น">หอพัก 9 ชั้น</option>
                        <option value="อาคาร CCT">อาคาร CCT</option>
                        <option value="บ้านทุ่ง 24/1">บ้านทุ่ง 24/1</option>
                        <option value="บ้านทุ่ง 24/2">บ้านทุ่ง 24/2</option>
                        <option value="2/1 ซอยสว่าง 2">2/1 ซอยสว่าง 2</option>
                        <option value="2 ซอยสว่าง 2">2 ซอยสว่าง 2</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>เดือน</label>
                        <select class="form-select" id="month" required>
                            <option value="1">มกราคม</option>
                            <option value="2">กุมภาพันธ์</option>
                            <option value="3">มีนาคม</option>
                            <option value="4">เมษายน</option>
                            <option value="5">พฤษภาคม</option>
                            <option value="6">มิถุนายน</option>
                            <option value="7">กรกฎาคม</option>
                            <option value="8">สิงหาคม</option>
                            <option value="9">กันยายน</option>
                            <option value="10">ตุลาคม</option>
                            <option value="11">พฤศจิกายน</option>
                            <option value="12">ธันวาคม</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>ปี (ค.ศ.)</label>
                        <input type="number" class="form-control" id="year" required value="2026">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>หน่วยที่ใช้ (kWh)</label>
                        <input type="number" step="0.01" class="form-control" id="units" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>จำนวนเงิน (บาท)</label>
                        <input type="number" step="0.01" class="form-control" id="amount" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btnSubmit">บันทึกข้อมูล</button>
            </form>
            <div class="mt-3 text-center">
                <a href="dashboard.html">ไปที่หน้า Dashboard</a>
            </div>
        </div>
    </div>
</div>

<script>
    // ** เปลี่ยน URL ตรงนี้เป็น URL ของ Web App ที่ได้จากขั้นตอนที่ 1 **
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqWI4F3NnGC2Bwg2tQ1SB-KDrpIMIg45jiQb2E64zDqQEHQqr4LXaQA6gymNF4ZEhw/exec';

    document.getElementById('elecForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = 'กำลังบันทึก...';

        const data = {
            location: document.getElementById('location').value,
            month: parseInt(document.getElementById('month').value),
            year: parseInt(document.getElementById('year').value),
            units: parseFloat(document.getElementById('units').value),
            amount: parseFloat(document.getElementById('amount').value)
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.status === 'success') {
                alert(`บันทึกสำเร็จ! ค่าไฟหน่วยละ ${result.costPerUnit} บาท`);
                document.getElementById('elecForm').reset();
            }
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการบันทึก');
        } finally {
            btn.disabled = false;
            btn.innerText = 'บันทึกข้อมูล';
        }
    });
</script>
</body>
</html>
